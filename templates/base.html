<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clinical Documentation Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar bg-white shadow-sm">
        <div class="sidebar-brand">
          <div class="sidebar-logo">CD</div>
          <div>
            <h2>ClinDoc AI</h2>
            <p>Clinical documentation assistant</p>
          </div>
        </div>
        <nav class="nav flex-column sidebar-nav">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{{ url_for('dashboard') }}">
            <i class="fa-solid fa-gauge-high me-2"></i> Dashboard
          </a>
          <a class="nav-link {% if request.path == '/agents' %}active{% endif %}" href="{{ url_for('agents_page') }}">
            <i class="fa-solid fa-robot me-2"></i> Agents
          </a>
        </nav>
      </aside>

      <div class="main-panel">
        <header class="topbar d-flex align-items-center justify-content-between px-4 py-3 shadow-sm bg-white rounded-4 mb-4">
          <div>
            <h3 class="mb-1">Clinical Documentation Assistant</h3>
            <p class="text-muted mb-0">Premium AI workflow for healthcare documentation.</p>
          </div>
          <div class="status-chip px-3 py-2 rounded-pill bg-success bg-opacity-10 text-success">
            <i class="fa-solid fa-circle-check me-2"></i> System Active
          </div>
        </header>

        <main class="px-4 pb-4">{% block content %}{% endblock %}</main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  </body>
</html>
