<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClinDoc AI Agents</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar bg-white shadow-sm">
        <div class="sidebar-brand">
          <div class="sidebar-logo">CD</div>
          <div>
            <h2>ClinDoc AI</h2>
            <p>Clinical documentation assistant</p>
          </div>
        </div>
        <nav class="nav flex-column sidebar-nav">
          <a class="nav-link" href="index.html"><i class="fa-solid fa-gauge-high me-2"></i> Dashboard</a>
          <a class="nav-link active" href="agents.html"><i class="fa-solid fa-robot me-2"></i> Agents</a>
        </nav>
      </aside>

      <div class="main-panel">
        <header class="topbar d-flex align-items-center justify-content-between px-4 py-3 shadow-sm mb-4">
          <div>
            <h3 class="mb-1">Agent Command Center</h3>
            <p class="text-muted mb-0">Monitor the AI agents behind clinical automation.</p>
          </div>
          <div class="status-chip bg-primary bg-opacity-10 text-primary py-2 px-3 rounded-pill">
            <i class="fa-solid fa-robot me-2"></i> All agents active
          </div>
        </header>

        <main class="px-4 pb-4">
          <section class="agents-page">
            <div class="d-flex align-items-start justify-content-between flex-wrap gap-3 mb-4">
              <div>
                <span class="eyebrow text-primary">AI operations</span>
                <h2 class="mt-2">Agent overview</h2>
                <p class="text-muted">Track the clinical AI agents that support every report.</p>
              </div>
            </div>

            <div class="row g-4" id="agents-list"></div>
          </section>
        </main>
      </div>
    </div>

    <script src="static/main.js"></script>
  </body>
</html>
